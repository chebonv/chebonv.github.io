<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 80)">
    <rect width="150" height="120" fill="#007AC3" />
    <text x="75" y="70" font-size="45" text-anchor="middle" fill="white">KEBS</text>
    <text x="75" y="100" font-size="18" text-anchor="middle" fill="white">Standards</text>
  </g>

  <g transform="translate(600, 380)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#888" opacity="0.6">
      Vincent
    </text>
    <text x="0" y="30" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#999" opacity="0.6">
      Chebon
    </text>
    <path d="M0,35 h180" stroke="#ccc" stroke-width="0.7" opacity="0.6"/>
  </g>

  <defs>
    <pattern id="grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <line x1="15" y1="0" x2="0" y2="15" stroke="#eee" stroke-width="0.5" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.1"/>

</svg>